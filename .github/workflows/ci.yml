name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: ./pairings-api

      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref || 'main' }} --depth=1

      - name: Lint changed Ruby files with RuboCop
        working-directory: ./pairings-api
        run: |
          BASE=${{ github.event.pull_request.base.ref || 'main' }}
          FILES=$(git diff --name-only --diff-filter=d origin/$BASE...HEAD -- '*.rb' | sed 's|^pairings-api/||')
          if [ -z "$FILES" ]; then
            echo "No Ruby files changed — skipping lint."
          else
            echo "$FILES" | xargs bundle exec rubocop --force-exclusion
          fi

  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: ./pairings-api

      - name: Scan for common Rails security vulnerabilities using static analysis
        working-directory: ./pairings-api
        run: bundle exec brakeman --no-pager

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: 123
          POSTGRES_DB: pairings_api_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup CI Configuration
        working-directory: ./pairings-api
        run: bin/setup_ci

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: ./pairings-api

      - name: Run tests
        env:
          RAILS_ENV: test
          DATABASE_USERNAME: admin
          DATABASE_PASSWORD: 123
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: pairings_api_test
        working-directory: ./pairings-api
        run: |
          bundle exec rails db:test:prepare
          bundle exec rails tailwindcss:build
          bundle exec rspec
